name: Build and publish image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - rootfs/**
      - versions/**
      - .github/workflows/build.yml
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read pinned versions
        id: versions
        run: |
          echo "librechat_ref=$(jq -r .ref versions/librechat.json)" >> "$GITHUB_OUTPUT"
          echo "librechat_sha=$(jq -r .sha versions/librechat.json)" >> "$GITHUB_OUTPUT"

      - name: Derive minor tag
        id: minor
        run: |
          ref='${{ steps.versions.outputs.librechat_ref }}'
          echo "minor=$(echo "$ref" | awk -F. '{print $1"."$2}')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            LIBRECHAT_REF=${{ steps.versions.outputs.librechat_ref }}
            LIBRECHAT_SHA=${{ steps.versions.outputs.librechat_sha }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.versions.outputs.librechat_ref }}
            ${{ steps.image.outputs.name }}:${{ steps.minor.outputs.minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
