name: PR verify

on:
  pull_request:
    paths:
      - Dockerfile
      - rootfs/**
      - versions/**
      - .github/workflows/pr-verify.yml

concurrency:
  group: pr-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: ShellCheck rootfs scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck
          shopt -s globstar nullglob
          files=(rootfs/etc/s6-overlay/scripts/*.sh rootfs/usr/local/bin/*)
          for f in "${files[@]}"; do
            head -n1 "$f" | grep -qE '^#!' || continue
            echo "checking $f"
            shellcheck -x "$f"
          done

  build-and-smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned versions
        id: versions
        run: |
          echo "librechat_ref=$(jq -r .ref versions/librechat.json)" >> "$GITHUB_OUTPUT"
          echo "librechat_sha=$(jq -r .sha versions/librechat.json)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: librechat-unraid:pr
          build-args: |
            LIBRECHAT_REF=${{ steps.versions.outputs.librechat_ref }}
            LIBRECHAT_SHA=${{ steps.versions.outputs.librechat_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: |
          mkdir -p "${RUNNER_TEMP}/config"
          docker run -d --name librechat-smoke \
            -p 3080:3080 \
            -v "${RUNNER_TEMP}/config:/config" \
            librechat-unraid:pr

      - name: Wait for services
        id: smoke
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 240 ))

          wait_for() {
            local label="$1"; shift
            while ! "$@" >/dev/null 2>&1; do
              if (( $(date +%s) > deadline )); then
                echo "::error::${label} did not come up within 240s"
                return 1
              fi
              sleep 3
            done
            echo "${label} OK"
          }

          # All internal services bind to 127.0.0.1 inside the container, so exec into it.
          wait_for "mongo"     docker exec librechat-smoke mongosh --quiet --host 127.0.0.1 --eval 'db.adminCommand({ping:1})'
          wait_for "meili"     docker exec librechat-smoke curl -fsS http://127.0.0.1:7700/health
          wait_for "librechat" curl -fsS http://127.0.0.1:3080/api/config

          body=$(curl -fsS http://127.0.0.1:3080/api/config)
          if ! echo "$body" | jq -e . >/dev/null 2>&1; then
            echo "::error::LibreChat /api/config returned non-JSON"
            echo "$body" | head -c 500
            exit 1
          fi
          echo "$body" | jq -e '.socialLogins != null or .appTitle != null or .registrationEnabled != null' \
            || { echo "::error::/api/config JSON missing expected keys"; exit 1; }

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== docker logs ==="
          docker logs librechat-smoke --tail 400 || true
          echo "=== /var/log/s6 ==="
          docker exec librechat-smoke sh -c 'ls -R /var/log/s6 2>/dev/null || true; for f in /var/log/s6/*/current; do [ -f "$f" ] && echo "--- $f ---" && tail -n 200 "$f"; done' || true
